project:
  type: website
  output-dir: _site
  render:
    - "**/*.qmd"   # only .qmd are pages; brand docs (STYLE-GUIDE.md) + README.md are not rendered
  resources:
    - CNAME        # custom-domain marker for GitHub Pages; must land in _site every build
    - assets/og-image.png   # social-share image referenced by open-graph/twitter-card meta

website:
  title: "Prospectra"
  description: "Geospatial analytics, indexed to the cell."
  site-url: https://prospectra.earth
  favicon: assets/brand/favicon.ico
  open-graph:
    image: assets/og-image.png
  twitter-card:
    image: assets/og-image.png
    card-style: summary_large_image
    creator: "@franjmartin21"
  navbar:
    background: light
    logo: assets/brand/prospectra-mark.svg
    left:
      - href: index.qmd
        text: Home
      - href: index.qmd#projects
        text: Projects
      - href: index.qmd#writing
        text: Writing
      - href: index.qmd#about
        text: About
  page-footer:
    left: "© 2026 Prospectra · Geospatial analytics, indexed to the cell."
    right:
      - icon: github
        href: https://github.com/ceo-prospectra/prospectra.earth
      - icon: twitter
        href: https://x.com/franjmartin21

format:
  html:
    theme:
      light: [cosmo, custom.scss]
    css: styles.css
    toc: true
    fontsize: 17px
    mainfont: "DM Sans"
    monofont: "IBM Plex Mono"
    headingfont: "Fraunces"
